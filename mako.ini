background-color=#131520
text-color=#EDEAF3
border-color=#262A36
progress-color=over #2C222B
width=420
height=110
padding=12
border-size=2
border-radius=12
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32
icons=1
markup=1
format=<b>%s</b>\n%b

[urgency=low]
background-color=#131520
text-color=#8A76A6
border-color=#262A36
default-timeout=3000

[urgency=normal]
background-color=#131520
text-color=#EDEAF3
border-color=#262A36
default-timeout=5000

[urgency=high]
background-color=#131520
text-color=#FFFFFF
border-color=#E07A9A
default-timeout=0

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
